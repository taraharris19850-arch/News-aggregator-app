name: 每日抓取并发布

on:
  schedule:
    # 北京时间每天 09:00 = UTC 01:00
    - cron: "0 1 * * *"
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发(测试用)

permissions:
  contents: write   # 把当天数据提交回仓库,累积历史
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取并加工新闻
        env:
          # 在仓库 Settings → Secrets → Actions 添加 ANTHROPIC_API_KEY 后,自动生成 AI 评述范例;
          # 未配置则自动跳过 AI 这一步,其余功能不受影响。
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: 提交数据(累积历史)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data
          git commit -m "数据更新 $(date -u +%Y-%m-%d)" || echo "无变化,跳过提交"
          git push || echo "推送跳过"

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传站点(web 目录)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
